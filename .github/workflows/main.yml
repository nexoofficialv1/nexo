name: Build NEXO APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find ZIP
        run: |
          ls -la
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "Found ZIP: $ZIP_FILE"

      - name: Unzip source
        run: |
          mkdir source
          unzip -o "$ZIP_FILE" -d source
          echo "Unzipped files:"
          find source -maxdepth 3 -type f | head -100

      - name: Locate Android project
        run: |
          PROJECT_DIR=$(find source -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project found at: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NEXO-Official-v1.1-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
