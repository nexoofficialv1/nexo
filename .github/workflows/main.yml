name: Build NEXO APK From ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Find ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 2 -type f -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found"
            exit 1
          fi
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "Found ZIP: $ZIP_FILE"

      - name: Unzip source
        run: |
          rm -rf source
          mkdir source
          unzip -o "$ZIP_FILE" -d source
          find source -maxdepth 5 -type f | head -200

      - name: Locate Android project
        run: |
          SETTINGS_FILE=$(find source -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1)
          if [ -z "$SETTINGS_FILE" ]; then
            echo "settings.gradle not found"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$SETTINGS_FILE")
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project found at: $PROJECT_DIR"
          ls -la "$PROJECT_DIR"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug
          else
            echo "gradlew not found, installing gradle"
            sudo apt-get update
            sudo apt-get install -y gradle
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NEXO-Official-v1.1-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
